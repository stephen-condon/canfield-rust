name: Release — publish

# Fires on every push to main. Releases only when the version in
# web/package.json has no matching git tag yet — i.e. right after a release PR
# (from `npm run release`) is squash-merged. Every other push is a no-op. Builds
# wasm from source + web/dist, tags the commit, and creates the GitHub Release
# with the bundle attached. Uses only the automatic GITHUB_TOKEN — no secret.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags + history for the no-op check and release notes

      - name: Read version + check for existing tag
        id: gate
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./web/package.json').version")"
          # Validate strictly: the version flows into later shell steps, so a
          # malformed value must never reach them (defense-in-depth, even though
          # it originates from a reviewed commit on protected main).
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version '$VERSION' in web/package.json is not X.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists — nothing to publish."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Publishing v$VERSION."
          fi

      - name: Install stable toolchain
        if: steps.gate.outputs.release == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        if: steps.gate.outputs.release == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        if: steps.gate.outputs.release == 'true'
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM from source
        if: steps.gate.outputs.release == 'true'
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/pkg

      - name: Setup Node
        if: steps.gate.outputs.release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web bundle
        if: steps.gate.outputs.release == 'true'
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Zip web bundle
        if: steps.gate.outputs.release == 'true'
        env:
          VERSION: ${{ steps.gate.outputs.version }}
        run: |
          set -euo pipefail
          cd web/dist
          zip -r "${GITHUB_WORKSPACE}/canfield-v${VERSION}-web.zip" .

      - name: Install git-cliff
        if: steps.gate.outputs.release == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Render release notes
        if: steps.gate.outputs.release == 'true'
        env:
          VERSION: ${{ steps.gate.outputs.version }}
        run: git cliff --unreleased --tag "v${VERSION}" --strip all -o RELEASE_NOTES.md

      - name: Create and push tag
        if: steps.gate.outputs.release == 'true'
        env:
          VERSION: ${{ steps.gate.outputs.version }}
        run: |
          set -euo pipefail
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.gate.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            "canfield-v${VERSION}-web.zip"
