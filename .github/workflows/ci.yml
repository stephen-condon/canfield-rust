name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test -p canfield-engine

  wasm-build:
    name: WASM build (wasm32 target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      # Build the wasm package from current source and publish it as an
      # artifact. The web and e2e jobs consume this instead of the committed
      # web/src/pkg/, so the production bundle and E2E tests always run against
      # CI-built artifacts — never a binary a contributor checked in. This
      # closes the supply-chain gap (a tampered/stale committed binary cannot
      # reach the build) and catches stale-logic drift the old byte-diff could
      # not. The committed web/src/pkg/ remains for local dev convenience;
      # keeping it fresh is a local Definition-of-Done step (see CLAUDE.md).
      - name: Build WASM package
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/pkg

      - name: Upload WASM package
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: web/src/pkg

  web:
    name: Web (tsc, unit tests, build)
    needs: wasm-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # Replace the committed pkg/ with the package built from source in CI,
      # so tsc and the production bundle run against current-source wasm.
      - name: Download CI-built WASM package
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: web/src/pkg

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  e2e:
    name: Web E2E (Playwright)
    needs: wasm-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # Run E2E against the CI-built wasm, not the committed binary.
      - name: Download CI-built WASM package
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: web/src/pkg

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        run: npm run test:e2e
